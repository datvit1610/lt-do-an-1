# ENV
app.database.username=postgres
app.database.password=Codec123
app.database.host=postgres
app.database.port=5432
app.database.db=adsssp

app.keycloak.uri=http://113.161.103.134:8108
app.keycloak.clientId=ssc-connect
app.keycloak.clientSecret=secret
app.keycloak.realm=ssc

app.headerResponseSize=1024

spring.application.name=SSPApplication
logging.level.com.codec.system=INFO

spring.datasource.hikari.poolName=Hikari
spring.data.jpa.repositories.bootstrap-mode=deferred
spring.jpa.properties.hibernate.jdbc.time_zone=UTC+7
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
spring.jpa.open-in-view=false
spring.datasource.driver-class-name=org.postgresql.Driver
# Config env database
spring.datasource.username=${app.database.username}
spring.datasource.url=jdbc:postgresql://${app.database.host}:${app.database.port}/${app.database.db}
spring.datasource.password=${app.database.password}

spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.order_inserts=true
spring.datasource.hikari.auto-commit=false
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.task.scheduling.thread-name-prefix=CodecSystemApplication-scheduling-
spring.task.execution.pool.keep-alive=10s
spring.task.execution.pool.queue-capacity=100
spring.task.scheduling.pool.size=2
spring.task.execution.pool.max-size=16
spring.task.execution.thread-name-prefix=CodecSystemApplication-task-
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
application.exception.package=org.,java.,net.,jakarta.,com.,io.,de.,com.codec.system
server.port=80
application.exception.details=false
springdoc.swagger-ui.operationsSorter=alpha
#springdoc.enable-native-support=true
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Metrics
management.endpoint.health.group.custom.include=diskSpace,ping
management.endpoint.health.group.custom.show-components=always
management.endpoint.health.group.custom.show-details=always
management.endpoints.web.exposure.include=*

#spring.jpa.show-sql=true
#jhipster.security.oauth2.audience=account,api://default
jhipster.cors.allowed-headers='*'
jhipster.cors.exposed-headers= 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
#jhipster.cors.allow-credentials= true
jhipster.cors.max-age= 1800

# Check token ko duoc xoa config

spring.security.oauth2.client.provider.oidc.issuer-uri= ${app.keycloak.uri}/realms/${app.keycloak.realm}
spring.security.oauth2.client.registration.oidc.client-id= ${app.keycloak.clientId}
spring.security.oauth2.client.registration.oidc.client-secret=  ${app.keycloak.clientSecret}
spring.security.oauth2.client.registration.oidc.scope= openid, profile, email, offline_access
jhipster.security.oauth2.audience=account,api://default

jwt.auth.converter.resource-id= ${app.keycloak.clientId}
jwt.auth.converter.principal-attribute=preferred_username
server.tomcat.maxHttpResponseHeaderSize=${app.headerResponseSize}

app.adapter.endpoint=http://103.252.73.46:8203


app.kafka.url=113.161.103.134:8094
app.kafka.groupId=qr-event-prod
app.kafka.producerRetries=3
app.kafka.env=PROD

spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.bootstrap-servers=${app.kafka.url}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.group-id=${app.kafka.groupId}
spring.kafka.producer.acks=all
spring.kafka.producer.bootstrap-servers=${app.kafka.url}
spring.kafka.producer.retries=${app.kafka.producerRetries}
environment= ${app.kafka.env}
